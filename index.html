<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0E121A" />
  <title>CENTRAL MUHENDISLIK</title>

  <link rel="manifest" href="manifest.webmanifest?v=CM3" />
  <link rel="apple-touch-icon" href="icons/logo.jpg" />
  <link rel="stylesheet" href="style.css?v=CM3" />
</head>
<body>

<!-- SCREEN 1 -->
<main id="screenPick" class="screenPick">
  <div class="pickCard">
    <img class="pickLogo" src="icons/logo.jpg" alt="Logo" />
    <div class="pickTitle">CENTRAL MUHENDISLIK</div>
    <div class="pickSub">KML seç → Uydu + Konum + Noktalar</div>

    <label class="pickBtn" id="pickBtn">
      KML Seç
      <input id="fileInput" type="file" accept=".kml,application/vnd.google-earth.kml+xml" hidden />
    </label>

    <div class="pickHint">
      WhatsApp → Paylaş → <b>Dosyalara Kaydet</b> → Uygulama → <b>KML Seç</b>
    </div>

    <div class="pickHint err" id="pickError" style="display:none;"></div>
  </div>
</main>

<!-- SCREEN 2 -->
<div id="screenMain" class="screenMain" style="display:none;">
  <header class="topbar">
    <div class="brand">
      <img class="brandLogo" src="icons/logo.jpg" alt="Logo" />
      <div>
        <div class="brandTitle">CENTRAL MUHENDISLIK</div>
        <div class="brandSub" id="status">-</div>
      </div>
    </div>

    <button class="btn ghost iconBtn" id="btnMenu" type="button" aria-label="Menü">⋯</button>
  </header>

  <!-- Menu -->
  <div class="menu" id="menu" style="display:none;">
    <button class="btn ghost menuBtn" id="btnFit" type="button">Kanavaya Yaklaş</button>
    <button class="btn ghost menuBtn danger" id="btnClear" type="button">Temizle</button>
  </div>

  <section class="mapWrap">
    <div id="map" class="map"></div>

    <div class="mapChips">
      <span class="chip" id="chipCount">0 nokta</span>
      <span class="chip" id="chipGps">GPS: -</span>
    </div>

    <!-- FAB -->
    <div class="fabWrap">
      <button class="fab primary" id="fabMe" type="button" aria-label="Konumum">⦿</button>
      <button class="fab" id="fabKml" type="button" aria-label="KML Değiştir">⬆︎</button>
    </div>

    <!-- Sheet handle -->
    <button class="sheetHandle" id="sheetHandle" type="button" aria-label="Listeyi aç/kapat">
      <span class="sheetPill"></span>
    </button>
  </section>

  <!-- Bottom sheet -->
  <section class="sheet" id="sheet">
    <div class="sheetTop">
      <input id="search" class="search" placeholder="Nokta ara..." autocomplete="off" />
    </div>
    <div id="list" class="list"></div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script src="app.js?v=CM3"></script>

<!-- Google Maps JS API -->
<script
  async
  defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDuIv98DcTNwDbzN70am6PdQXd8RY4mRTs&v=weekly&callback=onGoogleMapsLoaded">
</script>

</body>
</html>
