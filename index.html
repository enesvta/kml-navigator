<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0B0F17" />
  <title>CENTRAL MUHENDISLIK</title>

  <link rel="manifest" href="manifest.webmanifest?v=NEON1" />
  <link rel="apple-touch-icon" href="icons/logo.jpg" />
  <link rel="stylesheet" href="style.css?v=NEON1" />
</head>
<body>

<!-- SCREEN 1 (MINIMAL) -->
<main id="screenPick" class="screenPick">
  <div class="pickCard">
    <img class="pickLogo" src="icons/logo.jpg" alt="Logo" />
    <label class="pickBtn" id="pickBtn">
      KML Seç
      <input id="fileInput" type="file" accept=".kml,application/vnd.google-earth.kml+xml" hidden />
    </label>
    <div class="pickErr" id="pickError" style="display:none;"></div>
  </div>
</main>

<!-- SCREEN 2 -->
<div id="screenMain" class="screenMain" style="display:none;">
  <header class="topbar">
    <div class="brand">
      <img class="brandLogo" src="icons/logo.jpg" alt="Logo" />
      <div class="brandText">
        <div class="brandTitle">CENTRAL MUHENDISLIK</div>
        <div class="brandSub" id="status">-</div>
      </div>
    </div>
  </header>

  <section class="mapWrap">
    <div id="map" class="map"></div>

    <!-- Right mini actions (like your mock) -->
    <div class="rightRail">
      <button class="miniBtn" id="btnMe" type="button" aria-label="Konumum">
        <span class="miniIcon">⦿</span>
      </button>
      <button class="miniBtn" id="btnFit" type="button" aria-label="Kanavaya Yaklaş">
        <span class="miniIcon">◎</span>
      </button>
      <button class="miniBtn" id="btnKml" type="button" aria-label="KML Değiştir">
        <span class="miniIcon">⇪</span>
      </button>
      <button class="miniBtn danger" id="btnClear" type="button" aria-label="Temizle">
        <span class="miniIcon">✕</span>
      </button>
    </div>

    <!-- minimal chips -->
    <div class="chips">
      <span class="chip" id="chipCount">0</span>
      <span class="chip" id="chipGps">GPS</span>
    </div>

    <!-- sheet handle -->
    <button class="sheetHandle" id="sheetHandle" type="button" aria-label="Listeyi aç/kapat">
      <span class="sheetPill"></span>
    </button>
  </section>

  <!-- Bottom sheet list -->
  <section class="sheet" id="sheet">
    <div class="sheetTop">
      <input id="search" class="search" placeholder="Ara..." autocomplete="off" />
    </div>
    <div id="list" class="list"></div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script src="app.js?v=NEON1"></script>

<!-- Google Maps JS API -->
<script
  async
  defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDuIv98DcTNwDbzN70am6PdQXd8RY4mRTs&v=weekly&callback=onGoogleMapsLoaded">
</script>

</body>
</html>
