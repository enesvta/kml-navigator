<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#070A12" />
  <title>CENTRAL MUHENDISLIK</title>

  <link rel="manifest" href="manifest.webmanifest?v=SAHA2" />
  <link rel="apple-touch-icon" href="icons/logo.jpg" />
  <link rel="stylesheet" href="style.css?v=SAHA2" />
</head>
<body>

<main id="screenPick" class="screenPick">
  <div class="pickCard">
    <img class="pickLogo" src="icons/logo.jpg" alt="Logo" />
    <label class="pickBtn" id="pickBtn">
      KML Seç
      <input id="fileInput" type="file" accept=".kml,application/vnd.google-earth.kml+xml" hidden />
    </label>
    <div class="pickErr" id="pickError" style="display:none;"></div>
  </div>
</main>

<div id="screenMain" class="screenMain" style="display:none;">
  <header class="topbar">
    <div class="brand">
      <img class="brandLogo" src="icons/logo.jpg" alt="Logo" />
      <div class="brandText">
        <div class="brandTitle">CENTRAL MUHENDISLIK</div>
        <div class="brandSub" id="status">-</div>
      </div>
    </div>
  </header>

  <section class="mapWrap">
    <div id="map" class="map"></div>

    <div class="rightRail">
      <button class="miniBtn" id="btnMe" type="button" aria-label="Konumum"><span class="miniIcon">⦿</span></button>
      <button class="miniBtn" id="btnFit" type="button" aria-label="Kanavaya Yaklaş"><span class="miniIcon">◎</span></button>
      <button class="miniBtn" id="btnKml" type="button" aria-label="KML Değiştir"><span class="miniIcon">⇪</span></button>
      <button class="miniBtn" id="btnExport" type="button" aria-label="CSV Rapor"><span class="miniIcon">⤓</span></button>
      <button class="miniBtn danger" id="btnClear" type="button" aria-label="Temizle"><span class="miniIcon">✕</span></button>
    </div>

    <div class="chips">
      <span class="chip" id="chipCount">0</span>
      <span class="chip" id="chipGps">GPS</span>
      <span class="chip" id="chipDate">-</span>
    </div>

    <button class="sheetHandle" id="sheetHandle" type="button" aria-label="Listeyi aç/kapat">
      <span class="sheetPill"></span>
    </button>
  </section>

  <section class="sheet" id="sheet">
    <div class="sheetTop">
      <input id="search" class="search" placeholder="Ara..." autocomplete="off" />
    </div>
    <div id="list" class="list"></div>
  </section>
</div>

<div class="overlay" id="formOverlay" style="display:none;">
  <div class="formCard" role="dialog" aria-modal="true">
    <div class="formTop">
      <div>
        <div class="formTitle" id="formTitle">-</div>
        <div class="formSub" id="formPoint">-</div>
      </div>
      <button class="xBtn" id="btnFormClose" type="button">✕</button>
    </div>

    <div id="startFields">
      <label class="fLabel">Cihaz Adı</label>
      <input class="fInput" id="deviceName" placeholder="Örn: Cent.12" />

      <label class="fLabel">Cihaz Yüksekliği (m)</label>
      <input class="fInput" id="deviceHeight" inputmode="decimal" placeholder="Örn: 1.280" />

      <label class="fLabel">Yük Tipi</label>
      <select class="fInput" id="loadType">
        <option value="Jalon">Jalon</option>
        <option value="Tripod">Tripod</option>
        <option value="Pole">Pole</option>
        <option value="Diğer">Diğer</option>
      </select>

      <div class="row2">
        <div class="col">
          <label class="fLabel">Başlangıç Saati</label>
          <input class="fInput" id="startTime" inputmode="numeric" placeholder="HH:MM" />
        </div>
        <button class="fMini" id="btnNowStart" type="button">Şimdi</button>
      </div>
    </div>

    <div id="finishFields" style="display:none;">
      <div class="row2">
        <div class="col">
          <label class="fLabel">Bitiş Saati</label>
          <input class="fInput" id="endTime" inputmode="numeric" placeholder="HH:MM" />
        </div>
        <button class="fMini" id="btnNowEnd" type="button">Şimdi</button>
      </div>
    </div>

    <div class="formActions">
      <button class="aBtn" id="btnFormSave" type="button">Kaydet</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js?v=SAHA2"></script>

<script
  async
  defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDuIv98DcTNwDbzN70am6PdQXd8RY4mRTs&v=weekly&callback=onGoogleMapsLoaded">
</script>

</body>
</html>
