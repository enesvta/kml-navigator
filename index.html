<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f18" />
  <title>KML Navigator</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css" />
  <link rel="apple-touch-icon" href="icons/logo.jpg" />
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo" aria-hidden="true">K</div>
      <div>
        <div class="brandTitle">KML Navigator</div>
        <div class="brandSub" id="status">KML yükleyin</div>
      </div>
    </div>

    <div class="topActions">
      <label class="btn ghost">
        KML Seç
        <input id="fileInput" type="file" accept=".kml,application/vnd.google-earth.kml+xml" hidden />
      </label>

      <button class="btn ghost" id="btnClear" type="button" disabled>Temizle</button>
    </div>
  </header>

  <main class="container">

    <!-- Mini kontrol şeridi -->
    <section class="card" id="controlsCard" style="display:none;">
      <div class="row between">
        <div class="pill" id="countPill">0 nokta</div>

        <div class="row" style="gap:8px;">
          <button class="btn small ghost" id="btnNearest" type="button">En Yakın</button>
          <button class="btn small ghost" id="btnMyLoc" type="button">Konum→Hedef</button>
          <button class="btn small ghost" id="btnListTop" type="button">Liste Başı</button>
        </div>
      </div>

      <div class="row between" style="margin-top:10px;">
        <input class="search" id="search" placeholder="Ara (isim)..." autocomplete="off" />
        <label class="switch" title="Ulaştım sonrası otomatik navigasyon">
          <input type="checkbox" id="toggleAutoNav" />
          <span class="slider"></span>
          <span class="switchLabel">Auto Nav</span>
        </label>
      </div>

      <!-- Seçili nokta mini bilgi -->
      <div class="row between" style="margin-top:10px;">
        <div>
          <div class="itemTitle" id="selectedName">-</div>
          <div class="itemSub mono" id="selectedCoords">-</div>
        </div>

        <div class="row" style="gap:8px;">
          <button class="btn small" id="btnArrived" type="button">Ulaştım</button>
          <button class="btn small primary" id="btnNavSelected" type="button">Nav</button>
        </div>
      </div>
    </section>

    <!-- Liste -->
    <section class="card" id="listCard" style="display:none;">
      <div class="list" id="list"></div>
    </section>

    <section class="footerNote">
      <div class="muted">
        Noktaya dokun → Navigasyon açılır. CarPlay bağlıysa Google Maps navigasyon CarPlay ekranında devam eder.
      </div>
    </section>
  </main>

  <div class="toast" id="toast" aria-live="polite" aria-atomic="true"></div>

  <script src="app.js"></script>
</body>
</html>
