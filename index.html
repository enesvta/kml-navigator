<!doctype html>
<html lang="tr">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>

<title>CENTRAL MUHENDISLIK</title>

<link rel="manifest" href="manifest.webmanifest"/>
<link rel="stylesheet" href="style.css"/>

<meta name="theme-color" content="#070A12"/>

</head>
<body>


<!-- CYBER EARTH SCREEN -->

<main id="screenPick" class="screenPick">

<div class="earthBg">

<div class="glow glow1"></div>
<div class="glow glow2"></div>
<div class="glow glow3"></div>

<div class="globeWrap">

<div class="globe"></div>

<div class="ring ring1"></div>
<div class="ring ring2"></div>
<div class="ring ring3"></div>

</div>

</div>


<div class="pickOverlay"></div>


<div class="pickCard">

<img src="icons/logo.jpg" class="pickLogo">

<label class="pickBtn">

KML Seç

<input id="fileInput"
type="file"
accept=".kml"
hidden>

</label>

<div id="pickError" class="pickErr"></div>

</div>

</main>


<!-- MAIN APP -->

<div id="screenMain" style="display:none">

<div id="map"></div>

</div>


<script src="app.js"></script>


<script async defer
src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=onGoogleMapsLoaded">
</script>


</body>
</html>
